<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notlarım" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <meta name="theme-color" content="#0f0f0f" />

  <title>Notlarım</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app-root">

  <!-- ═══════════════════════════════
       ANA SAYFA
       ═══════════════════════════════ -->
  <div id="main-page" class="page-view">
    <header class="main-header">
      <div id="secret-tap-zone">
        <h1 id="app-title">Notlarım</h1>
      </div>
      <span id="tap-indicator"></span>
    </header>

    <div class="main-search">
      <div class="search-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15" height="15"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Ara</span>
      </div>
    </div>

    <div class="section-label">Listeler</div>

    <div class="notes-list">
      <!-- Ünlüler -->
      <button class="note-entry" id="entry-celebs" data-section="celebs">
        <div class="note-icon celebs-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <div class="note-info">
          <div class="note-title">Ünlüler</div>
        </div>
        <div class="note-meta">
          <span class="note-count" id="count-celebs">100</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </button>

      <div class="note-divider"></div>

      <!-- Yemekler -->
      <button class="note-entry" id="entry-foods" data-section="foods">
        <div class="note-icon foods-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-3.5-6.51-5-10.52-5C2.99 9.99 1 11.88 1 14.99v1h15.03v-1z"/></svg>
        </div>
        <div class="note-info">
          <div class="note-title">Yemekler</div>
        </div>
        <div class="note-meta">
          <span class="note-count" id="count-foods">100</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </button>

      <div class="note-divider"></div>

      <!-- Kartlar -->
      <button class="note-entry" id="entry-cards" data-section="cards">
        <div class="note-icon cards-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        </div>
        <div class="note-info">
          <div class="note-title">Kartlar</div>
        </div>
        <div class="note-meta">
          <span class="note-count" id="count-cards">52</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </button>
    </div>

    <p class="footer-note">3 liste · 252 öğe</p>

    <!-- Sahte Alt Bar (İnandırıcılık İçin) -->
    <div class="main-bottom-bar">
      <button class="bottom-btn fake-folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="22" height="22"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
      </button>
      <div class="bottom-note-count">252 Not</div>
      <button class="bottom-btn fake-compose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="22" height="22"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════
       DETAY SAYFASI
       ═══════════════════════════════ -->
  <div id="detail-page" class="page-view page-right">
    <header class="detail-header">
      <button id="back-btn" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20"><path d="M15 18l-6-6 6-6"/></svg>
        Notlarım
      </button>
    </header>
    <div class="detail-title-wrap">
      <h2 id="detail-title">—</h2>
      <span id="detail-subtitle"></span>
    </div>
    <div id="detail-list" class="detail-list"></div>
  </div>

</div><!-- /app-root -->


<!-- ═══════════════════════════════════════════
     GİZLİ PANEL
     ═══════════════════════════════════════════ -->
<div id="secret-overlay" class="hidden">
  <div id="secret-panel">
    <div class="panel-handle"></div>

    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="numbers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="15" height="15"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 17h7M17 14v7"/></svg>
        Hızlı Sayı
      </button>
      <button class="panel-tab" data-tab="words">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="15" height="15"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Kelime Ayarı
      </button>
    </div>

    <!-- TAB: HIZLI SAYI -->
    <div class="tab-content active" id="tab-content-numbers">
      <div class="num-rows">
        <div class="num-row active-row" id="nrow-celebs" data-list="celebs">
          <div class="ql-dot celebs-dot"></div>
          <span class="nr-name">Ünlüler</span>
          <span class="nr-word" id="nr-word-celebs">—</span>
          <div class="nr-display" id="nr-display-celebs">—</div>
        </div>
        <div class="num-row" id="nrow-foods" data-list="foods">
          <div class="ql-dot foods-dot"></div>
          <span class="nr-name">Yemekler</span>
          <span class="nr-word" id="nr-word-foods">—</span>
          <div class="nr-display" id="nr-display-foods">—</div>
        </div>
        <div class="num-row" id="nrow-cards" data-list="cards">
          <div class="ql-dot cards-dot"></div>
          <span class="nr-name">Kartlar</span>
          <span class="nr-word" id="nr-word-cards">—</span>
          <div class="nr-display" id="nr-display-cards">—</div>
        </div>
      </div>

      <div class="numpad-phone">
        <div class="nprow">
          <button class="np" data-d="1">1</button>
          <button class="np" data-d="2">2</button>
          <button class="np" data-d="3">3</button>
        </div>
        <div class="nprow">
          <button class="np" data-d="4">4</button>
          <button class="np" data-d="5">5</button>
          <button class="np" data-d="6">6</button>
        </div>
        <div class="nprow">
          <button class="np" data-d="7">7</button>
          <button class="np" data-d="8">8</button>
          <button class="np" data-d="9">9</button>
        </div>
        <div class="nprow">
          <button class="np np-clear" data-d="clear">Temizle</button>
          <button class="np" data-d="0">0</button>
          <button class="np np-back" data-d="back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="13" y2="14"/><line x1="13" y1="9" x2="18" y2="14"/></svg>
          </button>
        </div>
      </div>

      <button class="apply-btn" id="apply-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><path d="M20 6L9 17l-5-5"/></svg>
        Force Uygula
      </button>
      <button class="cancel-btn" id="cancel-btn">İptal</button>
    </div>

    <!-- TAB: KELIME AYARI -->
    <div class="tab-content" id="tab-content-words">
      <p class="tab-desc">Her liste için <b>bir kez</b> hedef kelimeyi seç.</p>

      <div class="word-pick-block">
        <div class="wpb-header">
          <div class="ql-dot celebs-dot"></div>
          <span class="wpb-title">Ünlüler</span>
          <span class="wpb-current" id="wpb-current-celebs">Seçilmedi</span>
        </div>
        <input type="text" class="word-search" id="wsearch-celebs" placeholder="Ara..." data-list="celebs" autocomplete="off" />
        <div class="word-choice-list" id="wchoice-celebs" data-list="celebs"></div>
      </div>

      <div class="word-pick-block">
        <div class="wpb-header">
          <div class="ql-dot foods-dot"></div>
          <span class="wpb-title">Yemekler</span>
          <span class="wpb-current" id="wpb-current-foods">Seçilmedi</span>
        </div>
        <input type="text" class="word-search" id="wsearch-foods" placeholder="Ara..." data-list="foods" autocomplete="off" />
        <div class="word-choice-list" id="wchoice-foods" data-list="foods"></div>
      </div>

      <div class="word-pick-block">
        <div class="wpb-header">
          <div class="ql-dot cards-dot"></div>
          <span class="wpb-title">Kartlar</span>
          <span class="wpb-current" id="wpb-current-cards">Seçilmedi</span>
        </div>
        <input type="text" class="word-search" id="wsearch-cards" placeholder="Ara..." data-list="cards" autocomplete="off" />
        <div class="word-choice-list" id="wchoice-cards" data-list="cards"></div>
      </div>

      <button class="save-words-btn" id="save-words-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Kelimeleri Kaydet
      </button>
      <button class="reset-all-btn" id="reset-all-btn">Listeleri Yeniden Karıştır</button>
    </div>

    <button class="panel-close-btn" id="panel-close">Kapat</button>
  </div>
</div>

<div id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW Registered!', reg);
      }).catch(err => console.log('SW Registration failed', err));
    });
  }
</script>
</body>
</html>
